<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pawfect Pals</title>
    <link rel="stylesheet" href="home.css">

    <style>
        main{
            display:flex;
            justify-content:center;
            align-items:center;
            height:80vh;
        }

        .login-box{
            background:#fff3e6;
            padding:35px;
            border-radius:18px;
            width:360px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:20px;
            color:#000958;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin-top:12px;
            border-radius:10px;
            border:1px solid #ccc;
            font-size:15px;
        }

        .login-box button{
            width:100%;
            margin-top:18px;
            padding:12px;
            border:none;
            border-radius:12px;
            background:#7c5edc;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        .login-box button:hover{
            background:#6a4fd8;
        }

        .error{
            color:red;
            text-align:center;
            margin-top:10px;
            font-size:14px;
        }
    </style>
</head>

<body>

<header>
    <div class="name">
        <div class="logo">
            <img src="logo.png" alt="Pawfect Pals logo">
            <h1>Pawfect Pals</h1>
        </div>
    </div>
    <hr class="my-line">
</header>

<main>
    <div class="login-box">
        <h2>🔐 Login</h2>

        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>

        <button onclick="login()">Login</button>

        <p id="error" class="error"></p>

        <p style="margin-top:15px;font-size:13px;text-align:center;">
            Demo login:<br>
            <strong>Email:</strong> bhavya@gmail.com<br>
            <strong>Password:</strong> bhavya
        </p>
    </div>
</main>

<script>
function login(){
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const error = document.getElementById("error");

    if(email === "bhavya@gmail.com" && password === "bhavya"){
        localStorage.setItem("loggedInUser", email);
        alert("Login successful 👋");
        window.location.href = "user.html";
    }else{
        error.innerText = "Invalid email or password";
    }
}
</script>

</body>
</html>
